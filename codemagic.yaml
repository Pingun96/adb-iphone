# Phác thảo cấu hình tự động build iOS cho Codemagic
workflows:
  ios-workflow:
    name: Build ADB Mobile for iPhone
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - apple_auth # Nhóm này bạn sẽ cấu hình Apple ID sau nếu muốn tự động ký
      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build iOS without signing (for sideloading)
        script: |
          flutter build ios --release --no-codesign
      - name: Create .ipa for Sideloadly
        script: |
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload
          zip -r ../ipa/ADB_Pro.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - your-email@example.com # Bạn có thể thay đổi sau trên web
