# Phác thảo cấu hình tự động build iOS (Hủy bỏ bắt buộc chữ ký Xcode)
workflows:
  ios-workflow:
    name: Build ADB Mobile for iPhone
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build iOS WITHOUT Signing (Force Bypass)
        script: |
          # Ép Xcode build cho thiết bị thật nhưng bỏ qua bước kiểm tra Team/Profile
          flutter build ios --release --no-codesign \
            --extra-front-end-options="--no-incremental-analyzer"
          
          # Thủ thuật tạo Payload để Sideloadly nhận diện
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ADB_Pro.ipa Payload
          
          # Di chuyển ra ngoài để Codemagic thu thập
          mv ADB_Pro.ipa ../../..
    artifacts:
      - "*.ipa"
    publishing:
      email:
        recipients:
          - your-email@example.com
