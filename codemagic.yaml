# Phác thảo cấu hình ADB (Bản Sản xuất Thực tế)
workflows:
  ios-workflow:
    name: Build ADB Mobile for iPhone
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build iOS Engine (Bypass Apple Gatekeeper)
        script: |
          # Dùng lệnh build ios chuẩn nhưng ép các cờ tắt chữ ký ở mức hệ thống
          flutter build ios --release --no-codesign \
            --extra-gen-snapshot-options="--no-incremental-analyzer" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM=""
          
          # Kiểm tra và đóng gói
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            mkdir -p Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            zip -r ADB_Pro.ipa Payload
            echo "Thành công! File đã được tạo."
          else
            echo "Lỗi: Không tìm thấy Runner.app. Đang thử cách dự phòng..."
            # Cách dự phòng: Build Archive
            flutter build ipa --no-codesign --release
            cp -r build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app Payload/
            zip -r ADB_Pro.ipa Payload
          fi
    artifacts:
      - "*.ipa"
