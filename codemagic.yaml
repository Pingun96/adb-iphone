# Phác thảo cấu hình ADB (Bản Cưỡng chế Thành công)
workflows:
  ios-workflow:
    name: Build ADB Mobile for iPhone
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build iOS No-Sign (Final Fix)
        script: |
          # Dùng xcodebuild flag để ép không ký tên
          flutter build ios --release --no-codesign \
            --extra-gen-snapshot-options="--no-incremental-analyzer"
          
          # Đổi tên và đóng gói vào thư mục Artifact hợp lệ
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          if [ -d "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -vr ADB_Pro.ipa Payload
          else
            echo "Lỗi: Không tìm thấy file .app để đóng gói!"
            exit 1
          fi
    artifacts:
      - "*.ipa"
