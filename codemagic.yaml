# Phác thảo cấu hình ADB (Bản Cưỡng chế Tuyệt đối)
workflows:
  ios-workflow:
    name: Build ADB Mobile for iPhone
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Hack Xcode Config (Remove Restrictions)
        script: |
          # Xóa sạch mọi dấu vết của Development Team và Provisioning Profile
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;//g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = [^;]*;//g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;//g' ios/Runner.xcodeproj/project.pbxproj
      - name: Build IPA (Force No-Sign)
        script: |
          # Dùng lệnh build IPA chính thức nhưng bỏ qua chữ ký
          flutter build ipa --no-codesign --release
          
          # Đổi tên và đưa ra thư mục Artifact
          find build/ios/archive -name "*.xcarchive" -exec cp -r {}/Products/Applications/Runner.app . \;
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r ADB_Pro.ipa Payload
    artifacts:
      - "*.ipa"
